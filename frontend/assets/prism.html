<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />

    <style>
      body {
        margin: 0;
        background: #111;
      }

      pre {
        margin: 0;
        padding: 12px;
        overflow-x: auto;
        font-family: Consolas, monospace;
        font-size: 14px;
        line-height: 1.35;
        color: #d4d4d4;
        white-space: pre;
      }

      .keyword-if {
        color: #569cd6;
      }
      .keyword-loop {
        color: #c586c0;
      }
      .keyword-print {
        color: #4ec9b0;
      }
      .keyword-var {
        color: #dcdcaa;
      }
      .operator {
        color: #d4d4d4;
        font-weight: bold;
      }
      .number {
        color: #b5cea8;
      }
    </style>
  </head>

  <body>
    <pre id="code"></pre>

    <script>
      function escapeHTML(code) {
        return code
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
      }

      function highlight(code) {
        code = escapeHTML(code)

        code = code.replace(
          /\b(senao se|se|senao|fim se|if|elif|else)\b/g,
          '<span class="keyword-if">$1</span>'
        )

        code = code.replace(
          /\b(repita|fim repita|enquanto|fim enquanto|while|for|range|inicio|fim)\b/g,
          '<span class="keyword-loop">$1</span>'
        )

        code = code.replace(
          /\b(mostre|print)\b/g,
          '<span class="keyword-print">$1</span>'
        )

        code = code.replace(
          /\b(vale)\b/g,
          '<span class="keyword-var">$1</span>'
        )

        code = code.replace(
          /\b(verdadeiro|falso|True|False)\b/g,
          '<span class="keyword-if">$1</span>'
        )

        code = code.replace(
          /(==|!=|>=|<=|>|<|=|\+|\-|\*|\/)/g,
          '<span class="operator">$1</span>'
        )

        code = code.replace(
          /\b\d+(\.\d+)?\b/g,
          '<span class="number">$&</span>'
        )

        return code
      }

      document.addEventListener('message', e => {
        document.getElementById('code').innerHTML = highlight(e.data)
      })
    </script>
  </body>
</html>
