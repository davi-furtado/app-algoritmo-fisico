<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        background: #111;
      }

      pre {
        margin: 0;
        padding: 12px;
        overflow-x: auto;
        font-family: Consolas, monospace;
        font-size: 14px;
        color: #d4d4d4;
      }

      .keyword-if {
        color: #569cd6;
      }

      .keyword-loop {
        color: #c586c0;
      }

      .keyword-print {
        color: #4ec9b0;
      }

      .keyword-var {
        color: #dcdcaa;
      }

      .operator {
        color: #d4d4d4;
        font-weight: bold;
      }

      .number {
        color: #b5cea8;
      }
    </style>
  </head>

  <body>
    <pre id="code"></pre>

    <script>
      function escapeHTML(code) {
        return code
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
      }

      function highlight(code) {
        code = escapeHTML(code)

        return code
          .replace(
            /\b(se|senao se|senao|fim se|if|elif|else)\b/g,
            '<span class="keyword-if">$&</span>'
          )
          .replace(
            /\b(repita|fim repita|enquanto|fim enquanto|while)\b/g,
            '<span class="keyword-loop">$&</span>'
          )
          .replace(
            /\b(mostre|print)\b/g,
            '<span class="keyword-print">$&</span>'
          )
          .replace(/\b(vale)\b/g, '<span class="keyword-var">$&</span>')
          .replace(
            /\b(verdadeiro|falso|True|False)\b/g,
            '<span class="keyword-if">$&</span>'
          )
          .replace(/\b(inicio|fim)\b/g, '<span class="keyword-loop">$&</span>')
          .replace(
            /(\+|\-|\*|\/|==|!=|>=|<=|>|<|=)/g,
            '<span class="operator">$1</span>'
          )
          .replace(/\b\d+(\.\d+)?\b/g, '<span class="number">$&</span>')
      }

      document.addEventListener('message', e => {
        document.getElementById('code').innerHTML = highlight(e.data)
      })
    </script>
  </body>
</html>
